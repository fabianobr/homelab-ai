services:
  ollama:
    image: ollama/ollama:0.30.10
    container_name: ollama
    profiles:
      - media-pipeline
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ${OLLAMA_DATA_DIR:?set OLLAMA_DATA_DIR in .env}:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=300s        # solta a VRAM rápido quando ocioso (libera p/ ComfyUI); node OllamaFlushVRAM é a garantia explícita
      # - OLLAMA_MAX_LOADED_MODELS=1  # 1 modelo na VRAM por vez (evita transbordo pra CPU com ComfyUI compartilhando)
    # GPU via CDI (nvidia.com/gpu=all) em vez do runtime nvidia legado.
    # O runtime legado injeta regras de cgroup pela nvidia-container-cli que o
    # systemd remove em qualquer `daemon-reload`, derrubando o acesso à GPU
    # (NVML "Unknown Error" -> fallback pra CPU). CDI usa o caminho OCI nativo
    # do runc, que sobrevive a reloads. Spec mantido por nvidia-cdi-refresh.service.
    devices:
      - "nvidia.com/gpu=all"
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 25g
        reservations:
          memory: 2g

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - WEBUI_NAME=Home Lab AI
      - ENABLE_SIGNUP=false
      - WEBUI_AUTH_TRUSTED_EMAIL_HEADER=Cf-Access-Authenticated-User-Email
      - ENABLE_OPENAI_API=True
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_BASE_URL=http://ollama:11434/v1
      - OPENAI_API_KEY=ollama
      - ENABLE_API_KEY=true
      - RAG_EMBEDDING_ENGINE=ollama                  # embeddings na GPU via Ollama (não na CPU local)
      - RAG_OLLAMA_BASE_URL=http://ollama:11434
      - RAG_EMBEDDING_MODEL=nomic-embed-text
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3g
        reservations:
          memory: 512m

  comfyui:
    profiles:
      - media-pipeline
    build:
      context: ${COMFYUI_SOURCE_DIR:?set COMFYUI_SOURCE_DIR in .env}
      dockerfile: ${HOMELAB_ROOT:?set HOMELAB_ROOT in .env}/infra/docker/comfyui/Dockerfile
    container_name: comfyui
    restart: unless-stopped
    command: ["python", "main.py", "--listen", "0.0.0.0", "--port", "8188", "--disable-cuda-malloc"]
    # GPU via CDI — ver comentário no serviço ollama. Evita perda de GPU em daemon-reload.
    devices:
      - "nvidia.com/gpu=all"
    ports:
      - "127.0.0.1:8188:8188"
    volumes:
      - ${COMFYUI_SOURCE_DIR:?set COMFYUI_SOURCE_DIR in .env}:/comfyui
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8188/system_stats', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # memswap_limit=-1: sem teto de swap para o container (replica comportamento local).
    # Localmente o processo usava os 32g de swap livremente; com teto restrito o
    # OOM-killer global disparava mesmo após aumentar o limite de RAM para 27g.
    memswap_limit: -1
    deploy:
      resources:
        limits:
          cpus: "4.0"
          # LTX Video offloada ~13GB para RAM do host + pinned memory CUDA → pico ~27GB.
          # 24g causava OOM-kill (3x em <DATE>). 27g alinha com o pico observado.
          memory: 27g
        reservations:
          memory: 2g

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    profiles:
      - optional
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - TZ=${TZ:-Etc/UTC}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:5678/healthz || wget -q --spider http://127.0.0.1:5678/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          memory: 256m

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    profiles:
      - optional
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # /health faz health profundo dos backends e pode acordar modelos Ollama.
      # A raiz valida só que o proxy HTTP está respondendo.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
        reservations:
          memory: 512m

volumes:
  open-webui:
    name: open-webui
    external: true
  n8n:
