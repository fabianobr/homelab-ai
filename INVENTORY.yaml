project:
  name: homelab-ai
  owner: Fabiano
  purpose: "Servidor pessoal de IA local"

host:
  hostname: homelab
  os: "Ubuntu 26.04"
  timezone: "America/Sao_Paulo"

hardware:
  gpu:
    vendor: NVIDIA
    model: "NVIDIA GPU"
    vram_gb: 16
  ram:
    total_gb: 32
  storage:
    primary: "NVMe SSD"

network:
  cloudflare:
    enabled: true
    purpose: "Publicação segura via tunnel e Access"

paths:
  project_root: "/home/user/homelab-ai"
  models: "/home/user/homelab-ai/models"
  data: "/home/user/homelab-ai/data"
  backups: "/home/user/homelab-ai/backups"

domains:
  open_webui: "ai.example.com"

access:
  cloudflare_access_email: "user@example.com"

ports:
  lmstudio: 1234
  open_webui: 3000
  comfyui: 8188
  n8n: 5678
