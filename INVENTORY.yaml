project:
  name: homelab-ai
  owner: Fabiano
  purpose: "Servidor pessoal de IA local"

host:
  hostname: ai-host
  os: "Ubuntu 26.04"
  timezone: "Etc/UTC"

hardware:
  gpu:
    vendor: NVIDIA
    model: "NVIDIA GPU"
    vram_gb: 16
  ram:
    total_gb: 32
  storage:
    primary: "NVMe SSD"

network:
  cloudflare:
    enabled: true
    purpose: "Publicação segura via tunnel e Access"

paths:
  project_root: "/opt/homelab-ai"
  models_ollama: "/srv/homelab-ai/ollama"
  models_comfyui: "/srv/homelab-ai/comfyui/models"
  data: "/opt/homelab-ai/data"
  backups: "/opt/homelab-ai/backups"

domains:
  open_webui: "ai.example.com"
  comfyui: "media.example.com"
  n8n: "flow.example.com"

access:
  cloudflare_access_email: "user@example.com"

ports:
  ollama: 11434
  open_webui: 3000
  comfyui: 8188
  n8n: 5678
